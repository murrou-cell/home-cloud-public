name: Build alertmanager-ntfy-bridge

on:
  push:
    branches: [main]
    paths:
      - 'bridge/alertmanager-ntfy-bridge/**'
      - '.github/workflows/alertmanager-ntfy-bridge.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: bridge/alertmanager-ntfy-bridge
          push: true
          tags: |
            ghcr.io/murrou-cell/alertmanager-ntfy-bridge:latest
            ghcr.io/murrou-cell/alertmanager-ntfy-bridge:${{ github.sha }}
