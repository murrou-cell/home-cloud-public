apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-ntfy-secret
  namespace: {{ .Release.Namespace }}
stringData:
  # Bitwarden can't create keys with hyphens, so client-id lives here.
  # client-secret and cookie-secret are written by bitwarden-vault PreSync;
  # SSA means Argo CD only owns this key and leaves the others untouched.
  client-id: "ntfy-oauth2-proxy"
