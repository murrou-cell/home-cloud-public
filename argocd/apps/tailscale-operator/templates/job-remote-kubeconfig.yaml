# Builds a remote-access kubeconfig via a bounded-lifetime SA token and pushes it to Bitwarden as a Secure Note; bump metadata.name to rotate.
apiVersion: batch/v1
kind: Job
metadata:
  name: k3s-remote-kubeconfig-to-bitwarden-v8
  namespace: bitwarden-vault
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  activeDeadlineSeconds: 900
  template:
    spec:
      serviceAccountName: remote-kubeconfig
      restartPolicy: Never
      containers:
        - name: push-kubeconfig-to-bitwarden
          image: "ghcr.io/murrou-cell/bitwarden-vault:main"
          envFrom:
            - secretRef:
                name: bw-credentials
          command:
            - bash
            - -c
            - |
              set -euo pipefail

              echo "Waiting for k3s-api-tailnet Service tailnet hostname..."
              HOST=""
              for i in $(seq 1 60); do
                HOST=$(kubectl get svc k3s-api-tailnet -n default \
                  -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
                if [ -n "$HOST" ]; then
                  break
                fi
                echo "  attempt $i/60..."
                sleep 10
              done
              if [ -z "$HOST" ]; then
                echo "Timed out waiting for k3s-api-tailnet hostname. Has the tag:k8s-api Tailscale ACL grant been added yet?" >&2
                exit 1
              fi
              echo "Discovered tailnet hostname: $HOST"

              echo "Minting a bounded-lifetime token for the remote-access ServiceAccount..."
              TOKEN=$(kubectl create token remote-access -n default --duration=2160h)
              CA_DATA=$(base64 -w0 /var/run/secrets/kubernetes.io/serviceaccount/ca.crt)

              cat > /tmp/remote-kubeconfig <<KUBECONFIG_EOF
              apiVersion: v1
              kind: Config
              clusters:
                - cluster:
                    certificate-authority-data: ${CA_DATA}
                    server: https://${HOST}:6443
                  name: default
              contexts:
                - context:
                    cluster: default
                    user: remote-access
                  name: default
              current-context: default
              users:
                - name: remote-access
                  user:
                    token: ${TOKEN}
              KUBECONFIG_EOF

              if ! bw login --check >/dev/null 2>&1; then
                echo "Logging in to Bitwarden..."
                bw login --apikey
              else
                echo "Already logged in, reusing session"
              fi

              echo "Unlocking vault..."
              SESSION=$(bw unlock "$BW_PASSWORD" --raw)

              echo "Syncing vault..."
              bw sync --session "$SESSION"

              # --rawfile lets jq handle JSON-escaping the kubeconfig text.
              ITEM_JSON=$(jq -n --rawfile kc /tmp/remote-kubeconfig \
                '{organizationId:null,folderId:null,type:2,name:"home-cloud-remote-kubeconfig",notes:$kc,secureNote:{type:0}}')

              EXISTING_ID=$(bw list items --session "$SESSION" \
                | jq -r '.[] | select(.name=="home-cloud-remote-kubeconfig") | .id' | head -1)

              if [ -n "$EXISTING_ID" ]; then
                echo "$ITEM_JSON" | bw encode | bw edit item "$EXISTING_ID" --session "$SESSION" >/dev/null
                echo "Updated existing Bitwarden item $EXISTING_ID with new kubeconfig"
              else
                CREATE_OUT=$(echo "$ITEM_JSON" | bw encode | bw create item --session "$SESSION")
                ITEM_ID=$(echo "$CREATE_OUT" | jq -r '.id')
                echo "Created Bitwarden item $ITEM_ID with kubeconfig embedded in notes"
              fi
          volumeMounts:
            - name: bw-data
              mountPath: "/root/.config/Bitwarden CLI/"
      volumes:
        - name: bw-data
          emptyDir: {}
