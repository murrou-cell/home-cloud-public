# Dedicated identity for remote kubectl access, independently revocable from k3s's own admin cert.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: remote-access
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: remote-access
subjects:
  - kind: ServiceAccount
    name: remote-access
    namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
