apiVersion: v1
kind: ServiceAccount
metadata:
  name: remote-kubeconfig
  namespace: bitwarden-vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-k3s-api-tailnet-service
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["k3s-api-tailnet"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: remote-kubeconfig-read-k3s-api-tailnet
  namespace: default
subjects:
  - kind: ServiceAccount
    name: remote-kubeconfig
    namespace: bitwarden-vault
roleRef:
  kind: Role
  name: read-k3s-api-tailnet-service
  apiGroup: rbac.authorization.k8s.io
---
# Lets the kubeconfig-refresh job mint a token for the remote-access SA instead of reading the master's admin cert.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mint-remote-access-token
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    resourceNames: ["remote-access"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: remote-kubeconfig-mint-remote-access-token
  namespace: default
subjects:
  - kind: ServiceAccount
    name: remote-kubeconfig
    namespace: bitwarden-vault
roleRef:
  kind: Role
  name: mint-remote-access-token
  apiGroup: rbac.authorization.k8s.io
