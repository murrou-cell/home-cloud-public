tailscale-operator:
  # operator-oauth secret is managed by bitwarden-vault (sync wave -1).
  # Omitting oauth.clientId/clientSecret here prevents helm from creating
  # an empty secret that would clobber the bitwarden-synced credentials.
  operatorConfig:
    hostname: "home-cloud-operator"
    defaultTags:
      - "tag:k8s-operator"

# Master IP for this wrapper chart's own templates/ (remote kubectl access) -- not shared with the Ansible role's TLS SAN value.
k3sMasterIp: "<YOUR_IP>"
