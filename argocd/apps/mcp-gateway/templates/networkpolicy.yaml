apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-gateway
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: mcp-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager
              app.kubernetes.io/instance: kube-prometheus-stack-alertmanager
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: ntfy
      ports:
        - port: 80
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: llamacpp
          podSelector:
            matchLabels:
              app: llamacpp
      ports:
        - port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kubernetes-mcp-server
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-mcp-server
              app.kubernetes.io/instance: kubernetes-mcp-server
      ports:
        - port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
