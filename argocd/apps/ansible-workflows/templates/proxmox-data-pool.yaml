apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: proxmox-data-pool
  namespace: {{ .Release.Namespace }}
spec:
  entrypoint: setup-data-pool
  serviceAccountName: argo-workflow
  ttlStrategy:
    secondsAfterCompletion: 86400
  arguments:
    parameters:
    - name: pve2_ip
      value: {{ .Values.proxmoxNewNodeIp | quote }}
  templates:
  - name: setup-data-pool
    inputs:
      parameters:
      - name: pve2_ip
      artifacts:
      - name: repo
        path: /workspace/repo
        git:
          repo: https://github.com/murrou-cell/home-cloud
          revision: main
          usernameSecret:
            name: github-credentials
            key: username
          passwordSecret:
            name: github-credentials
            key: token
    nodeSelector:
      kubernetes.io/hostname: k3s-ops
    container:
      image: cytopia/ansible:latest-tools
      command: [sh, /workspace/repo/ansible/scripts/proxmox-data-pool.sh]
      env:
      - name: PVE2_IP
        value: "{{ "{{inputs.parameters.pve2_ip}}" }}"
      volumeMounts:
      - name: ssh-key
        mountPath: /ssh
        readOnly: true
    volumes:
    - name: ssh-key
      secret:
        secretName: {{ .Values.ansibleSshKeySecret | quote }}
        defaultMode: 0400
