argo-cd:
  configs:
    params:
      server.insecure: "false"
    cm:
      url: https://argo-cd.<YOUR_TAILSCALE_DOMAIN>.ts.net
      admin.enabled: "false"
      dex.config: |
        connectors:
        - type: github
          id: github
          name: GitHub
          config:
            clientID: $dex.github.clientId
            clientSecret: $dex.github.clientSecret
            loadAllGroups: false
        staticClients:
        - id: argo-workflows
          name: Argo Workflows
          secret: $dex.workflows.clientSecret
          redirectURIs:
          - https://argo-workflows.<YOUR_TAILSCALE_DOMAIN>.ts.net/oauth2/callback
        - id: atlantis-oauth2-proxy
          name: Atlantis
          secret: $dex.atlantis.clientSecret
          redirectURIs:
          - https://atlantis.<YOUR_TAILSCALE_DOMAIN>.ts.net/oauth2/callback
        - id: longhorn-oauth2-proxy
          name: Longhorn
          secret: $dex.longhorn.clientSecret
          redirectURIs:
          - https://longhorn.<YOUR_TAILSCALE_DOMAIN>.ts.net/oauth2/callback
    rbac:
      policy.default: role:readonly
      policy.csv: |
        g, <YOUR_EMAIL>, role:admin
      scopes: "[groups, email]"

  crds:
    install: true

  dex:
    enabled: true
    nodeSelector:
      kubernetes.io/hostname: k3s-worker
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi

  notifications:
    enabled: false

  server:
    nodeSelector:
      kubernetes.io/hostname: k3s-worker
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

  repoServer:
    nodeSelector:
      kubernetes.io/hostname: k3s-worker
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 1024Mi

  applicationSet:
    nodeSelector:
      kubernetes.io/hostname: k3s-worker
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi

  controller:
    nodeSelector:
      kubernetes.io/hostname: k3s-worker
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1024Mi

  redis:
    nodeSelector:
      kubernetes.io/hostname: k3s-worker
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
