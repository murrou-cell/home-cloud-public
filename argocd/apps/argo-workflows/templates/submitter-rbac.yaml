apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-submitter
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-submitter
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [argoproj.io]
  resources: [workflows]
  verbs: [create]
- apiGroups: [argoproj.io]
  resources: [workflowtemplates]
  verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-submitter
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-submitter
subjects:
- kind: ServiceAccount
  name: argo-submitter
  namespace: {{ .Release.Namespace }}
---
# Grants the Atlantis pod SA permission to create/get Workflows directly via the
# Kubernetes API so Atlantis does not need to go through the Argo Workflows server.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-submitter-atlantis
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-submitter
subjects:
- kind: ServiceAccount
  name: atlantis
  namespace: atlantis
