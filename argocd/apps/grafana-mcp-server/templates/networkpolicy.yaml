apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-mcp-server
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana-mcp
      app.kubernetes.io/instance: grafana-mcp-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        # mcp-gateway lives in the ntfy namespace, reusing ntfy-credentials
        # rather than duplicating that secret into a namespace of its own.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ntfy
          podSelector:
            matchLabels:
              app: mcp-gateway
      ports:
        - port: 8000
    - from:
        # claude-playbook-agent's dry run (see agent.py's dry_run_investigate) - same read-only
        # access mcp-gateway already has, just from a second, ephemeral caller.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argo-workflows
          podSelector:
            matchLabels:
              app: claude-playbook-agent
      ports:
        - port: 8000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
              app.kubernetes.io/instance: kube-prometheus-stack
      ports:
        - port: 3000
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
