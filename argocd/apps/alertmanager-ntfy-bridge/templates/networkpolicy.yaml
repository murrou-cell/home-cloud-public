apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alertmanager-ntfy-bridge
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: alertmanager-ntfy-bridge
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager
              app.kubernetes.io/instance: kube-prometheus-stack-alertmanager
      ports:
        - port: 8080
  # Egress scoped to exactly what the bridge calls: ntfy, plus DNS.
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: ntfy
      ports:
        - port: 80
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
