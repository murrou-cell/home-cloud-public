apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-ntfy-bridge
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager-ntfy-bridge
  template:
    metadata:
      labels:
        app: alertmanager-ntfy-bridge
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      # Private image - ghcr-pull-secret is a bitwarden-vault-managed
      # dockerconfigjson Secret, not declared here in git.
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: bridge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080
          env:
            - name: NTFY_URL
              value: "http://ntfy.ntfy.svc.cluster.local"
            - name: NTFY_PUBLISHER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentialsSecret }}
                  key: publisherpassword
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # timeoutSeconds/periodSeconds relaxed from defaults, same reasoning
          # as ntfy's probes.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            timeoutSeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            timeoutSeconds: 5
            periodSeconds: 15
