apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamacpp
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: llamacpp
  template:
    metadata:
      labels:
        app: llamacpp
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        - name: llama-server
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          args:
            - "--hf-repo"
            - "{{ .Values.model.hfRepo }}"
            - "--hf-file"
            - "{{ .Values.model.hfFile }}"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--n-gpu-layers"
            - "{{ .Values.gpuLayers }}"
            # OpenAI-style tool-calling support (Qwen2.5's chat template
            # handles tool_call/tool_result natively under --jinja).
            - "--jinja"
            - "--ctx-size"
            - "8192"
          env:
            - name: LLAMA_CACHE
              value: /models
          ports:
            - containerPort: 8080
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # Render node access needs the device cgroup opened up -- hostPath
          # alone isn't enough, EPERM persists even as root without this.
          securityContext:
            privileged: true
          # Liveness/readiness don't start counting until this first succeeds - without it, a
          # 4B-parameter model loading into 4GB VRAM can easily take longer than the ~55s
          # (10s + 3x15s) liveness previously allowed, killing the container mid-load and
          # restart-looping indefinitely (observed: 12 restarts over 37h).
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 15
          volumeMounts:
            - name: dri
              mountPath: /dev/dri
            - name: models
              mountPath: /models
      volumes:
        - name: dri
          hostPath:
            path: /dev/dri
        - name: models
          persistentVolumeClaim:
            claimName: llamacpp-models
