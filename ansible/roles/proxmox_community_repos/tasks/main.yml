---
# deb822 format: adding "Enabled: no" disables the repo without deleting it.
# lineinfile handles both the "line absent" and "line present with wrong value" cases idempotently.

- name: Disable PVE enterprise repository
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
    regexp: '^Enabled:'
    line: 'Enabled: no'

- name: Disable Ceph enterprise repository
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/ceph.sources
    regexp: '^Enabled:'
    line: 'Enabled: no'

- name: Add PVE no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: {{ pve_debian_suite }}
      Components: pve-no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg

- name: Add Ceph no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/ceph-no-subscription.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/ceph-reef
      Suites: {{ pve_debian_suite }}
      Components: no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
  when: pve_enable_ceph_no_sub | bool

- name: Remove Ceph no-subscription repository when not enabled
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/ceph-no-subscription.sources
    state: absent
  when: not (pve_enable_ceph_no_sub | bool)

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

# Replaces the Ext.Msg.show call that fires the nag popup with void() — a no-op.
# The regex won't match after patching so this task is idempotent.
- name: Suppress PVE subscription nag popup
  ansible.builtin.replace:
    path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
    regexp: "Ext\\.Msg\\.show\\(\\{\\s*title:\\s*gettext\\('No valid subscription'\\)"
    replace: "void({title: gettext('No valid subscription')"
  when: pve_suppress_nag | bool
