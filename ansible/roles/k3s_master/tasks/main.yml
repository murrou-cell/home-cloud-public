---
- name: Download k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: "0755"

- name: Install k3s server
  ansible.builtin.command:
    cmd: /tmp/k3s-install.sh
    creates: /usr/local/bin/k3s
  environment:
    INSTALL_K3S_EXEC: "server --disable traefik"

- name: Wait for node to be Ready
  ansible.builtin.command: k3s kubectl get nodes
  register: nodes_output
  until: "'Ready' in nodes_output.stdout"
  retries: 20
  delay: 5
  changed_when: false

# Adds the tailnet hostname as a TLS SAN so kubectl over Tailscale passes cert verification.
- name: Configure additional TLS SAN for tailnet remote kubectl access
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/config.yaml
    mode: "0644"
    content: |
      tls-san:
        - "k3s-api.<YOUR_TAILSCALE_HOST>.ts.net"
  register: k3s_tls_san_config

- name: Restart k3s to pick up new TLS SAN
  ansible.builtin.systemd:
    name: k3s
    state: restarted
  when: k3s_tls_san_config.changed

- name: Read node-token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw

- name: Expose node-token as host fact for workers
  ansible.builtin.set_fact:
    k3s_node_token: "{{ k3s_token_raw.content | b64decode | trim }}"
